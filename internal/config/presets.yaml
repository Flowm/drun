services:
  aws:
    image: amazon/aws-cli:2.34.32@sha256:4611a918d72fe666b94c4436386bc857a2c765cd5ffa07faaa651330cd5f30a7
    volumes:
      - ~/.aws:/root/.aws
    user: default

  claude:
    image: node:25-alpine@sha256:bdf2cca6fe3dabd014ea60163eca3f0f7015fbd5c7ee1b0e9ccb4ced6eb02ef4
    entrypoint: claude
    environment:
      HOME: /home/user
    volumes:
      - ~/.claude:/home/user/.claude
      - ~/.gitconfig:/home/user/.gitconfig:ro
    x-drun-layer:
      apk: [git]
      npm: ['@anthropic-ai/claude-code']

  codex:
    image: node:25-alpine@sha256:bdf2cca6fe3dabd014ea60163eca3f0f7015fbd5c7ee1b0e9ccb4ced6eb02ef4
    entrypoint: codex
    environment:
      HOME: /home/user
    volumes:
      - ~/.codex:/home/user/.codex
      - ~/.gitconfig:/home/user/.gitconfig:ro
    x-drun-layer:
      apk: [git]
      npm: ['@openai/codex']

  dive:
    image: wagoodman/dive:v0.13.1@sha256:f1886e6c32c094fc41a623c1989f5cb3e48aa766da5f0be233f911fc1d85ce10
    user: default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  gdal:
    image: ghcr.io/osgeo/gdal:alpine-small-3.6.3@sha256:5acba2cc589839090cfe5e90a990c6383c883a3507102bcd8f9a842891a6f672

  go:
    image: golang:1.26-alpine@sha256:f85330846cde1e57ca9ec309382da3b8e6ae3ab943d2739500e08c86393a21b1
    environment:
      GOPATH: /cwd/.go
      GOCACHE: /cwd/.go/cache

  jq:
    image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    x-drun-layer:
      apk: [jq]

  mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    volumes:
      - ~/.mc:/.mc

  mitmproxy:
    image: mitmproxy/mitmproxy:12.2.2@sha256:f4f0f41f5278f284fcc0a306f82849f38ab2e133c1d71d25a42bd06d7ff6928b
    entrypoint: mitmweb
    command: [--web-host, 0.0.0.0]
    ports: [2080:8080, 127.0.0.1:2081:8081]
    volumes:
      - ~/.mitmproxy:/home/mitmproxy/.mitmproxy
    user: default

  mtr:
    image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    entrypoint: mtr
    x-drun-layer:
      apk: [mtr]

  node:
    image: node:25-alpine@sha256:bdf2cca6fe3dabd014ea60163eca3f0f7015fbd5c7ee1b0e9ccb4ced6eb02ef4

  opencode:
    image: ghcr.io/anomalyco/opencode:1.4.17@sha256:2e0bd1c938f5138813a6ce7140d3988c23fcbb825c8d14de6aa4dd226382b9aa
    environment:
      HOME: /home/user
    volumes:
      - ~/.config/opencode:/home/user/.config/opencode
      - ~/.local/share/opencode:/home/user/.local/share/opencode
      - ~/.local/state/opencode:/home/user/.local/state/opencode
      - ~/.cache/opencode:/home/user/.cache/opencode
      - ~/.gitconfig:/home/user/.gitconfig:ro
    x-drun-layer:
      apk: [git, git-lfs, nodejs, npm, uv, go, make, curl]

  pandoc:
    image: pandoc/core:3.9@sha256:bfca0ecc070ece31b6f56ba668446ab2dc9c973047eebb57b4d0710de8b91d0b

  python:
    image: python:3.14-alpine@sha256:dd4d2bd5b53d9b25a51da13addf2be586beebd5387e289e798e4083d94ca837a

  ripgrep:
    image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    entrypoint: rg
    x-drun-layer:
      apk: [ripgrep]

  rclone:
    image: rclone/rclone:1.73.4@sha256:654f6517c7aaec7e377690b2caf7c272dbe5f3b8200afbc14a00df6b4a9aa6ef
    volumes:
      - ~/.config/rclone:/config/rclone

  shellcheck:
    image: koalaman/shellcheck:v0.11.0@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d

  terraform:
    image: hashicorp/terraform:1.14@sha256:42ecfb253183ec823646dd7859c5652039669409b44daa72abf57112e622849a

  updatecli:
    image: ghcr.io/updatecli/updatecli:v0.116.1@sha256:21ddf70ebb8c8c740d8dd9983897a6a7f1c346fa5839f0cb3e2ee3904ff0eab0

  uv:
    image: ghcr.io/astral-sh/uv:0.11.7-python3.14-trixie@sha256:9e9b645dc1a26a9e10ec64073c37e05d85b0d41c2b6946603c8863792f38cade

  yq:
    image: mikefarah/yq:4@sha256:0cb4a78491b6e62ee8a9bf4fbeacbd15b5013d19bc420591b05383a696315e60
